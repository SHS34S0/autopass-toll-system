{% extends "layout.html" %}

{% block content %}
<div class="mt-5">
    <form action="/registrer" method="post">

        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="first_name" placeholder="First Name" type="text">
        </div>

        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="last_name" placeholder="Last Name" type="text">
        </div>
        <div class="mb-5">
            <input class="form-control mx-auto w-auto" name="phone" placeholder="Phone" type="text">
        </div>
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="email" placeholder="Email"
                type="email">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" name="confirmation" placeholder="Confirmation" type="password">
        </div>
        <button class="btn btn-primary mx-auto d-block" type="submit">Register</button>
    </form>
</div>
{% endblock %}
